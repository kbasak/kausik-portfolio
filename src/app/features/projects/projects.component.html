<section class="projects section" id="projects">
  <div class="container">

    <!-- Section Header -->
    <app-section-title appScrollReveal tag="What I've Built" title="Featured" highlight="Projects"
      subtitle="Enterprise applications delivered across banking, fintech, and healthcare domains.">
    </app-section-title>

    <!-- Projects Grid -->
    <div class="projects__grid" appScrollReveal [revealDelay]="0.15">

      <div class="project-card" *ngFor="let project of projects; let i = index"
        [style.animation-delay]="i * 0.15 + 's'">

        <!-- Domain color bar at top of card -->
        <div class="project-card__bar" [style.background]="getDomainColor(project.domain)">
        </div>

        <div class="project-card__content">

          <!-- Domain Badge + Project Number -->
          <div class="project-card__meta">
            <span class="domain-badge" [style.color]="getDomainColor(project.domain)"
              [style.border-color]="getDomainColor(project.domain) + '40'">
              {{ project.domain }}
            </span>
            <span class="project-number">0{{ i + 1 }}</span>
          </div>

          <!-- Project Name -->
          <h3 class="project-card__name">{{ project.name }}</h3>

          <!-- Client -->
          <p class="project-card__client">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            {{ project.client }}
          </p>

          <!-- Description -->
          <p class="project-card__description">{{ project.description }}</p>

          <!-- Key Highlights -->
          <ul class="project-card__highlights">
            <li *ngFor="let highlight of project.highlights" class="project-highlight">
              <span class="highlight-arrow">›</span>
              <span>{{ highlight }}</span>
            </li>
          </ul>

          <!-- Tech Stack -->
          <div class="project-card__tech">
            <app-skill-badge *ngFor="let tech of project.techStack" [name]="tech" category="backend">
            </app-skill-badge>
          </div>

        </div>
      </div>

    </div>

  </div>
</section>
